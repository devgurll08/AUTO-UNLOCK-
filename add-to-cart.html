<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ADD TO CART</title>
    <link rel="stylesheet" href="cart-style.css" />
</head>
<body>
  <header>
    <h1>🛍 My Shopping Cart</h1>
    <nav>
      <a href="home.html">Home</a>
      <a href="wishlist.html">Wishlist</a>
    </nav>
  </header>

  <main>
    <h2>Your Items</h2>
    <div id="cart-items"></div>

    <div id="cart-total">
      <p>Total: ₹<span id="total-price">0 </span></p>
      <button id="checkout-btn">Proceed to Checkout</button>
    </div>
  </main>
  <script src="script.js">
  
  let cart =[];
 window.onload= function(){cart = JSON.parse(localStorage.getItem('cart')) || [];
  displayCart();}
  function displayCart() {
  const cartContainer = document.getElementById('cart-items');
  const totalPriceEl = document.getElementById('total-price');
  if (cart.length === 0) {
    cartContainer.innerHTML = "<p>Your cart is empty! 🛒</p>";
    totalPriceEl.textContent = "0";
    return;
  }
   let total = 0;
  let html = '';

  cart.forEach((item, index) => {
    const itemTotal = item.price * item.quantity;
    total += itemTotal;

    html += `
      <div class="cart-item" style="display:flex; gap:15px; margin:15px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <img src="${item.image || 'https://via.placeholder.com/80'}" width="80" height="80" style="object-fit:cover;">
        <div style="flex:1;">
          <h3>${item.name}</h3>
          <p>₹${item.price} × ${item.quantity}</p>
          <button onclick="removeFromCart(${index})" style="color:red;">Remove</button>
        </div>
        <p><strong>₹${itemTotal.toFixed(2)}</strong></p>
      </div>
    `;
  });

  cartContainer.innerHTML = html;
  totalPriceEl.textContent = total.toFixed(2);
}
function removeFromCart(index) {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  displayCart();
}
</script>
</body>
</html>
</body>
</html>
