<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO UNLOCK </title>
</head>
<body>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #005f73, #0a9396);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .signup-box {
      background: #001219;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      width: 340px;
    }
    .sigmup_to_login{
      text-align: right;
    }
    .sigmup_to_login h3{
      font-size: 10px;
    }

    .signup-box h2 {
      margin-bottom: 25px;
      font-size: 24px;
      text-align: center;
      color: #94d2bd;
    }

    .signup-box label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .signup-box input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .signup-box button {
      width: 100%;
      padding: 10px;
      background: #94d2bd;
      color: #001219;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .signup-box button:hover {
      background: #e9d8a6;
    }
  </style>
</head>
  <div class="signup-box">
    <h2>Create Your Account</h2>
   <form onsubmit="window.location.href='home.html'; return false;">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" required />

      <button type="submit">Sign Up</button>
    </form>
    <div class="sigmup_to_login">
      <h3>Already have Account<a href="LOGIN.HTML">Login</a></h3>
    </div>
  </div>
</body>
</html>
