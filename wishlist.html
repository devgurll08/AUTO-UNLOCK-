<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wishlist | YourStore</title>
<style>
  /* 🌈 Basic Page Styling */
  * { box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: #f5f6fa;
    margin: 0;
    padding: 0;
    color: #333;
  }

  header {
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    color: #fff;
    text-align: center;
    padding: 25px 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  header h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: 600;
  }

  .wishlist-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px 20px;
    max-width: 1200px;
    margin: auto;
  }

  .item {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    padding: 15px;
    text-align: center;
    transition: 0.3s ease;
  }

  .item:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }

  .item img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .item h3 {
    font-size: 1.1rem;
    margin: 10px 0 5px;
  }

  .item p {
    color: #666;
    font-weight: 500;
    margin: 5px 0;
  }

  .price {
    color: #2ecc71;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .remove-btn {
    background: #ff4d4d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s ease;
  }

  .remove-btn:hover {
    background: #e60000;
  }

  .empty {
    text-align: center;
    font-size: 1.2rem;
    color: #777;
    margin-top: 80px;
  }

  footer {
    background: #222;
    color: #aaa;
    text-align: center;
    padding: 15px;
    font-size: 0.9rem;
    margin-top: 30px;
  }

  footer a {
    color: #6a11cb;
    text-decoration: none;
  }
</style>
</head>
<body>

<header>
  <h1>💖 My Wishlist</h1>
  <p>Save the products you love — shop them anytime!</p>
</header>

<div class="wishlist-container" id="wishlistContainer"></div>

<div class="empty" id="emptyMsg">Your wishlist is empty 😢</div>

<footer>
  © 2025 YourStore | <a href="index.html">Back to Shop</a>
</footer>

<script>
const wishlistContainer = document.getElementById("wishlistContainer");
const emptyMsg = document.getElementById("emptyMsg");

// Load wishlist data
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

function renderWishlist() {
  wishlistContainer.innerHTML = "";
  
  if (wishlist.length === 0) {
    emptyMsg.style.display = "block";
    return;
  } else {
    emptyMsg.style.display = "none";
  }

  wishlist.forEach((item, index) => {
    const card = document.createElement("div");
    card.classList.add("item");
    card.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p class="price">₹${item.price}</p>
      <button class="remove-btn" onclick="removeFromWishlist(${index})">Remove</button>
    `;
    wishlistContainer.appendChild(card);
  });
}

function removeFromWishlist(index) {
  wishlist.splice(index, 1);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  renderWishlist();
}

renderWishlist();
</script>

</body>
</html>
